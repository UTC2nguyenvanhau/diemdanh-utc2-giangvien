<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Giảng Viên - UTC2</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="login-overlay">
    <div class="admin-card">
        <div class="theme-switch-wrapper">
            <label class="theme-switch">
                <input type="checkbox" id="checkbox-login" onchange="toggleTheme(this)">
                <div class="slider"></div>
            </label>
        </div>

        <div class="logo-container">
            <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/03/Logo-Dai-Hoc-Giao-Thong-Van-Tai-UTC.png" class="logo-school">
        </div>
        <h1>XÁC THỰC GIẢNG VIÊN</h1>
        <input type="password" id="login-pass" class="input-field" placeholder="Nhập mật khẩu quản lý">
        <button class="btn" onclick="checkLogin()">ĐĂNG NHẬP</button>
    </div>
</div>

<div class="admin-card" id="dashboard" style="display:none;">
    <div class="theme-switch-wrapper">
        <label class="theme-switch">
            <input type="checkbox" id="checkbox-dash" onchange="toggleTheme(this)">
            <div class="slider"></div>
        </label>
    </div>
    
    <div class="logo-container">
        <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/03/Logo-Dai-Hoc-Giao-Thong-Van-Tai-UTC.png" class="logo-school">
    </div>
    <h1>THỐNG KÊ ĐIỂM DANH</h1>
    <p class="subtitle">TRƯỜNG ĐH GIAO THÔNG VẬN TẢI - PHÂN HIỆU TP.HCM</p>

    <div class="stat-box">
        <span id="total-present">0</span>
        <small class="stat-label">SINH VIÊN ĐÃ CÓ MẶT</small>
    </div>

    <div class="button-group">
        <button class="btn" onclick="refreshData()" id="btnRef">🔄 LÀM MỚI</button>
        <button class="btn btn-excel" onclick="exportToExcel()">📥 XUẤT EXCEL</button>
    </div>
    
    <div class="button-group">
        <button class="btn btn-secondary" onclick="showSearchModal()">🔍 TRA CỨU SINH VIÊN</button>
        <button class="btn btn-secondary" onclick="showPassModal()">⚙️ ĐỔI MẬT KHẨU ADMIN</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>MSSV</th>
                    <th>HỌ VÀ TÊN</th>
                    <th>THỜI GIAN</th>
                </tr>
            </thead>
            <tbody id="attendance-list"></tbody>
        </table>
    </div>
</div>

<div id="password-modal" class="modal-overlay">
    <div class="admin-card modal-card">
        <h1>ĐỔI MẬT KHẨU ADMIN</h1>
        <input type="password" id="old-pass" class="input-field" placeholder="Mật khẩu hiện tại">
        <input type="password" id="new-pass" class="input-field" placeholder="Mật khẩu mới">
        <button class="btn" onclick="updatePassword()">LƯU THAY ĐỔI</button>
        <button class="btn btn-secondary" onclick="closePassModal()">HỦY</button>
    </div>
</div>

<div id="search-modal" class="modal-overlay">
    <div class="admin-card modal-card">
        <h1>TRA CỨU TÀI KHOẢN</h1>
        <input type="number" id="search-mssv" class="input-field" placeholder="Nhập MSSV cần tìm">
        <button class="btn" onclick="searchStudent()" id="btnSearch">TÌM KIẾM</button>
        
        <div id="search-result" style="display: none; margin-top: 15px; text-align: left; padding: 15px; background: var(--bg-color); border-radius: 12px;">
            <p>MSSV: <b id="res-mssv" style="color: var(--accent-color);"></b></p>
            <p>Họ tên: <b id="res-name" style="color: var(--primary-color);"></b></p>
            <p>Mật khẩu: <b id="res-pass" style="color: var(--error);"></b></p>
        </div>

        <button class="btn btn-secondary" onclick="closeSearchModal()">ĐÓNG</button>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
